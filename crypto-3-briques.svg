<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/></pattern></defs>
  <rect width="960" height="320" fill="#FAF9F5"/><rect width="960" height="320" fill="url(#grid)"/>
  <text x="40" y="54" fill="#2B0D57" font-size="27" font-weight="800">Les 3 briques de la crypto</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Comprends ces trois mots, et tu as compris l'essentiel.</text>

  <rect x="40" y="120" width="270" height="150" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="64" y="158" fill="#1A1A1A" font-size="18" font-weight="700">La blockchain</text>
  <text x="64" y="196" fill="#6B6B6B" font-size="14">Le registre public et partagé</text>
  <text x="64" y="216" fill="#6B6B6B" font-size="14">que personne ne peut trafiquer.</text>

  <rect x="345" y="120" width="270" height="150" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="369" y="158" fill="#1A1A1A" font-size="18" font-weight="700">Le wallet</text>
  <text x="369" y="196" fill="#6B6B6B" font-size="14">Ton portefeuille : là où tu</text>
  <text x="369" y="216" fill="#6B6B6B" font-size="14">gardes tes clés.</text>

  <rect x="650" y="120" width="270" height="150" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="674" y="158" fill="#1A1A1A" font-size="18" font-weight="700">L'exchange</text>
  <text x="674" y="196" fill="#6B6B6B" font-size="14">La plateforme où tu achètes</text>
  <text x="674" y="216" fill="#6B6B6B" font-size="14">et vends ta crypto.</text>

  <text x="40" y="298" fill="#9CA3AF" font-size="12">De la valeur 100 % numérique qui circule de personne à personne, sans banque au milieu.</text>
</svg>
