<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#2B0D57"/></marker>
  </defs>
  <rect width="960" height="320" fill="#FAF9F5"/><rect width="960" height="320" fill="url(#grid)"/>
  <text x="40" y="54" fill="#2B0D57" font-size="27" font-weight="800">Le rendement passif, en clair</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Tu prêtes tes cryptos, on te verse un intérêt. Ce n'est pas du staking.</text>

  <rect x="40" y="120" width="250" height="130" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="165" y="175" fill="#1A1A1A" font-size="17" font-weight="700" text-anchor="middle">Tu déposes</text>
  <text x="165" y="202" fill="#6B6B6B" font-size="14" text-anchor="middle">tes cryptos</text>

  <rect x="355" y="120" width="250" height="130" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="480" y="175" fill="#1A1A1A" font-size="17" font-weight="700" text-anchor="middle">Elles sont prêtées</text>
  <text x="480" y="202" fill="#6B6B6B" font-size="14" text-anchor="middle">à des emprunteurs</text>

  <rect x="670" y="120" width="250" height="130" rx="8" fill="#FFFFFF" stroke="#2B0D57" stroke-width="2"/>
  <circle cx="795" cy="158" r="18" fill="#E2EB3F"/><text x="795" y="164" fill="#2B0D57" font-size="16" font-weight="800" text-anchor="middle">%</text>
  <text x="795" y="205" fill="#1A1A1A" font-size="17" font-weight="700" text-anchor="middle">Tu reçois un intérêt</text>
  <text x="795" y="230" fill="#6B6B6B" font-size="13" text-anchor="middle">variable, non garanti</text>

  <line x1="302" y1="185" x2="343" y2="185" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="617" y1="185" x2="658" y2="185" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>

  <text x="40" y="296" fill="#9CA3AF" font-size="12">L'intérêt vient des emprunteurs qui paient pour ça. Rien de magique : un rendement énorme cache un risque énorme.</text>
</svg>
