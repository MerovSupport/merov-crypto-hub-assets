<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2B0D57"/>
    </marker>
  </defs>
  <rect width="960" height="350" fill="#FAF9F5"/>
  <rect width="960" height="350" fill="url(#grid)"/>

  <text x="40" y="54" fill="#2B0D57" font-size="27" font-weight="800">Le staking, en 3 temps</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Tu mets tes cryptos au travail pour sécuriser un réseau Proof of Stake.</text>

  <!-- Etape 1 -->
  <rect x="40" y="120" width="260" height="160" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <circle cx="74" cy="158" r="15" fill="#2B0D57"/><text x="74" y="163" fill="#FFFFFF" font-size="15" font-weight="700" text-anchor="middle">1</text>
  <text x="100" y="163" fill="#1A1A1A" font-size="16" font-weight="700">Tu immobilises</text>
  <text x="64" y="210" fill="#6B6B6B" font-size="14">Tu bloques une partie</text>
  <text x="64" y="232" fill="#6B6B6B" font-size="14">de tes cryptos.</text>

  <!-- Etape 2 -->
  <rect x="350" y="120" width="260" height="160" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <circle cx="384" cy="158" r="15" fill="#2B0D57"/><text x="384" y="163" fill="#FFFFFF" font-size="15" font-weight="700" text-anchor="middle">2</text>
  <text x="410" y="163" fill="#1A1A1A" font-size="16" font-weight="700">Tu sécurises</text>
  <text x="374" y="210" fill="#6B6B6B" font-size="14">Elles aident à valider</text>
  <text x="374" y="232" fill="#6B6B6B" font-size="14">et protéger le réseau.</text>

  <!-- Etape 3 (mise en avant) -->
  <rect x="660" y="120" width="260" height="160" rx="8" fill="#FFFFFF" stroke="#2B0D57" stroke-width="2"/>
  <circle cx="694" cy="158" r="15" fill="#E2EB3F"/><text x="694" y="163" fill="#2B0D57" font-size="15" font-weight="800" text-anchor="middle">3</text>
  <text x="720" y="163" fill="#1A1A1A" font-size="16" font-weight="700">Tu es récompensé</text>
  <text x="684" y="210" fill="#1A1A1A" font-size="14">Tu reçois des</text>
  <text x="684" y="232" fill="#1A1A1A" font-size="14">récompenses régulières.</text>

  <!-- Fleches centrees dans les espaces -->
  <line x1="314" y1="200" x2="336" y2="200" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="624" y1="200" x2="646" y2="200" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>

  <text x="40" y="324" fill="#9CA3AF" font-size="12">Risques : période de blocage, pénalité (slashing), volatilité de l'actif. Récompenses variables, non garanties.</text>
</svg>
