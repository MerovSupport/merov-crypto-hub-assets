<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#2B0D57"/></marker>
  </defs>
  <rect width="960" height="320" fill="#FAF9F5"/><rect width="960" height="320" fill="url(#grid)"/>
  <text x="40" y="54" fill="#2B0D57" font-size="27" font-weight="800">Acheter ta 1ère crypto, en 4 étapes</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Sereinement, sans te faire avoir sur les frais ni la sécurité.</text>

  <rect x="40" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <circle cx="70" cy="152" r="14" fill="#2B0D57"/><text x="70" y="157" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="60" y="196" fill="#1A1A1A" font-size="15" font-weight="700">Choisir un</text>
  <text x="60" y="216" fill="#1A1A1A" font-size="15" font-weight="700">exchange régulé</text>

  <rect x="280" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <circle cx="310" cy="152" r="14" fill="#2B0D57"/><text x="310" y="157" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="300" y="196" fill="#1A1A1A" font-size="15" font-weight="700">Créer et vérifier</text>
  <text x="300" y="216" fill="#1A1A1A" font-size="15" font-weight="700">ton compte</text>

  <rect x="520" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <circle cx="550" cy="152" r="14" fill="#2B0D57"/><text x="550" y="157" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="540" y="196" fill="#1A1A1A" font-size="15" font-weight="700">Déposer</text>
  <text x="540" y="216" fill="#1A1A1A" font-size="15" font-weight="700">tes euros</text>

  <rect x="760" y="120" width="200" height="140" rx="8" fill="#FFFFFF" stroke="#2B0D57" stroke-width="2"/>
  <circle cx="790" cy="152" r="14" fill="#E2EB3F"/><text x="790" y="157" fill="#2B0D57" font-size="14" font-weight="800" text-anchor="middle">4</text>
  <text x="780" y="196" fill="#1A1A1A" font-size="15" font-weight="700">Acheter</text>
  <text x="780" y="216" fill="#1A1A1A" font-size="15" font-weight="700">ta crypto</text>

  <line x1="246" y1="190" x2="274" y2="190" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="486" y1="190" x2="514" y2="190" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="726" y1="190" x2="754" y2="190" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>

  <text x="40" y="296" fill="#9CA3AF" font-size="12">Dernier réflexe : ne laisse pas tout sur la plateforme. Pour le long terme, passe en self-custody.</text>
</svg>
