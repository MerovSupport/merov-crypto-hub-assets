<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/></pattern></defs>
  <rect width="760" height="340" fill="#FAF9F5"/><rect width="760" height="340" fill="url(#grid)"/>
  <text x="40" y="54" fill="#2B0D57" font-size="26" font-weight="800">Les options : call et put</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Une option, c'est un droit (pas une obligation), pour un prix et une date fixés. Niveau avancé.</text>

  <rect x="40" y="115" width="335" height="170" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="64" y="152" fill="#1A1A1A" font-size="18" font-weight="700">Call</text>
  <text x="64" y="186" fill="#6B6B6B" font-size="14">Le droit d'ACHETER à un prix fixé.</text>
  <text x="64" y="222" fill="#1A1A1A" font-size="14" font-weight="600">Tu te positionnes pour une hausse.</text>

  <rect x="395" y="115" width="325" height="170" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/>
  <text x="419" y="152" fill="#1A1A1A" font-size="18" font-weight="700">Put</text>
  <text x="419" y="186" fill="#6B6B6B" font-size="14">Le droit de VENDRE à un prix fixé.</text>
  <text x="419" y="222" fill="#1A1A1A" font-size="14" font-weight="600">Tu te couvres, ou tu paries sur une baisse.</text>

  <text x="40" y="316" fill="#9CA3AF" font-size="12">Produit avancé et risqué : tu peux perdre la prime payée. Réservé à ceux qui maîtrisent déjà les bases.</text>
</svg>
