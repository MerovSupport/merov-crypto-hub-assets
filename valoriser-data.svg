<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Avenir Next, Avenir, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#2B0D57" stroke-opacity="0.06" stroke-width="1"/></pattern>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#2B0D57"/></marker>
  </defs>
  <rect width="760" height="420" fill="#FAF9F5"/><rect width="760" height="420" fill="url(#grid)"/>
  <text x="40" y="54" fill="#2B0D57" font-size="26" font-weight="800">Où trouver les vraies données</text>
  <text x="40" y="84" fill="#6B6B6B" font-size="15">Juger un projet sur des faits, pas sur le hype. Voici quoi regarder, et où.</text>

  <g font-size="15">
    <rect x="40" y="112" width="330" height="48" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/><text x="60" y="141" fill="#1A1A1A" font-weight="600">Prix et capitalisation</text>
    <line x1="378" y1="136" x2="406" y2="136" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="414" y="112" width="306" height="48" rx="8" fill="#2B0D57"/><text x="434" y="141" fill="#FFFFFF" font-weight="700">CoinGecko, CoinMarketCap</text>

    <rect x="40" y="170" width="330" height="48" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/><text x="60" y="199" fill="#1A1A1A" font-weight="600">TVL (valeur verrouillée)</text>
    <line x1="378" y1="194" x2="406" y2="194" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="414" y="170" width="306" height="48" rx="8" fill="#2B0D57"/><text x="434" y="199" fill="#FFFFFF" font-weight="700">DefiLlama</text>

    <rect x="40" y="228" width="330" height="48" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/><text x="60" y="257" fill="#1A1A1A" font-weight="600">Adresses et transactions</text>
    <line x1="378" y1="252" x2="406" y2="252" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="414" y="228" width="306" height="48" rx="8" fill="#2B0D57"/><text x="434" y="257" fill="#FFFFFF" font-weight="700">Etherscan, Glassnode</text>

    <rect x="40" y="286" width="330" height="48" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/><text x="60" y="315" fill="#1A1A1A" font-weight="600">Activité des développeurs</text>
    <line x1="378" y1="310" x2="406" y2="310" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="414" y="286" width="306" height="48" rx="8" fill="#2B0D57"/><text x="434" y="315" fill="#FFFFFF" font-weight="700">GitHub du projet</text>

    <rect x="40" y="344" width="330" height="48" rx="8" fill="#FFFFFF" stroke="#E5E2D9"/><text x="60" y="373" fill="#1A1A1A" font-weight="600">Déblocages de tokens</text>
    <line x1="378" y1="368" x2="406" y2="368" stroke="#2B0D57" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="414" y="344" width="306" height="48" rx="8" fill="#2B0D57"/><text x="434" y="373" fill="#FFFFFF" font-weight="700">TokenUnlocks, whitepaper</text>
  </g>
</svg>
